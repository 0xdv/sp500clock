<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S&amp;P 500 — Election Cycles</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #cdd9e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
    }
    h1 {
      font-size: clamp(14px, 2.2vw, 20px);
      font-weight: 600;
      color: #e6edf3;
      text-align: center;
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .subtitle {
      font-size: 16px;
      color: #8b949e;
      text-align: center;
      margin-bottom: 20px;
    }
    .chart-wrap {
      width: 100%;
      max-width: 90vw;
      position: relative;
    }
    canvas { display: block; width: 100% !important; }
    #status {
      font-size: 12px;
      color: #8b949e;
      text-align: center;
      margin-top: 10px;
      min-height: 18px;
    }
    #status.err { color: #f85149; }
    .legend {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #8b949e;
    }
    .legend-dot {
      width: 28px;
      height: 3px;
      border-radius: 2px;
    }
    .legend-dot.historical { background: #4fa3e0; opacity: 0.6; }
    .legend-dot.current    { background: #FFD700; }
  </style>
</head>
<body>
  <h1>S&amp;P 500 — All 4-Year Election Cycles Overlaid (1928–2020)</h1>
  <p class="subtitle">Older cycles are more transparent → newer are brighter &nbsp;·&nbsp; <span style="color:#FFD700">gold line</span> = current cycle 2025–present</p>
  <div class="chart-wrap">
    <canvas id="chart" height="620"></canvas>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot historical"></div>Historical cycles (1928–2020)</div>
    <div class="legend-item"><div class="legend-dot current"></div>2025–now (live)</div>
  </div>
  <div id="status">Loading data…</div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script>
    const TRADING_DAYS_4Y = 252 * 4;
    const YEAR_FRAC = 252 / TRADING_DAYS_4Y;   // 0.25

    const statusEl = document.getElementById('status');

    function setStatus(msg, isErr = false) {
      statusEl.textContent = msg;
      statusEl.className = isErr ? 'err' : '';
    }

    /* ── helpers ── */
    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    /* ── build chart ── */
    let chartInst = null;

    function buildChart(historicalCycles, currentPct) {
      const ctx = document.getElementById('chart').getContext('2d');
      const n = historicalCycles.length;

      /* year-boundary vertical annotations (manual) */
      Chart.register({
        id: 'yearlines',
        afterDraw(chart) {
          const { ctx, chartArea, scales } = chart;
          if (!chartArea || !scales.x) return;
          ctx.save();
          // Draw 3 dividing lines at 0.25, 0.5, 0.75
          ctx.setLineDash([4, 4]);
          ctx.strokeStyle = 'rgba(255,255,255,0.18)';
          ctx.lineWidth = 1;
          for (let i = 1; i <= 3; i++) {
            const px = scales.x.getPixelForValue(i * YEAR_FRAC);
            ctx.beginPath();
            ctx.moveTo(px, chartArea.top);
            ctx.lineTo(px, chartArea.bottom);
            ctx.stroke();
          }
          // Label each year region at its center, above the chart area
          ctx.setLineDash([]);
          ctx.font = '14px -apple-system,sans-serif';
          ctx.fillStyle = 'rgba(255,255,255,0.5)';
          ctx.textAlign = 'center';
          const yearLabels = ["Post-election", "Midterm", "Pre-election", "Election"];
          for (let i = 0; i < 4; i++) {
            const cx = scales.x.getPixelForValue((i + 0.5) * YEAR_FRAC);
            ctx.fillText(yearLabels[i], cx, chartArea.top - 5);
          }
          ctx.restore();
        },
      });

      const datasets = historicalCycles.map((c, idx) => {
        const alpha = parseFloat((0.08 + 0.62 * (idx / (n - 1))).toFixed(3));
        return {
          label: c.year.toString(),
          data: c.x.map((x, i) => ({ x, y: c.pct[i] })),
          borderColor: hexToRgba('#4fa3e0', alpha),
          borderWidth: 1.2,
          pointRadius: 0,
          tension: 0.2,
          showLine: true,
        };
      });

      // current cycle
      if (currentPct && currentPct.length) {
        const xs = Array.from({ length: currentPct.length }, (_, i) => i / TRADING_DAYS_4Y);
        datasets.push({
          label: '2025 (current)',
          data: xs.map((x, i) => ({ x, y: currentPct[i] })),
          borderColor: '#FFD700',
          borderWidth: 2.5,
          pointRadius: 0,
          tension: 0.15,
          showLine: true,
          order: -1,
        });
      }

      chartInst = new Chart(ctx, {
        type: 'scatter',
        data: { datasets },
        options: {
          animation: false,
          responsive: true,
          maintainAspectRatio: true,
          layout: { padding: { top: 18 } },
          plugins: {
            legend: { display: false },
            tooltip: {
              mode: 'nearest',
              intersect: false,
              callbacks: {
                title: items => {
                  const d = items[0].dataset;
                  const x = items[0].parsed.x;
                  return `${d.label}  (+${(x * 4).toFixed(2)} yr)`;
                },
                label: item => `${item.parsed.y >= 0 ? '+' : ''}${item.parsed.y.toFixed(1)}%`,
              },
              backgroundColor: 'rgba(22,27,34,0.92)',
              borderColor: '#444',
              borderWidth: 1,
              titleColor: '#e6edf3',
              bodyColor: '#cdd9e5',
            },
          },
          scales: {
            x: {
              type: 'linear',
              min: 0,
              max: 1,
              grid: { color: 'rgba(255,255,255,0.06)' },
              ticks: {
                color: '#8b949e',
                callback: v => {
                  const labels = { 0: 'Election', 0.25: '+1 year', 0.5: '+2 years', 0.75: '+3 years', 1: '+4 years' };
                  return labels[v] ?? '';
                },
                stepSize: 0.25,
              },
              border: { color: '#444' },
            },
            y: {
              grid: { color: 'rgba(255,255,255,0.06)' },
              ticks: {
                color: '#8b949e',
                callback: v => `${v > 0 ? '+' : ''}${v}%`,
              },
              border: { color: '#444' },
            },
          },
          backgroundColor: '#0d1117',
        },
      });
    }

    /* ── fetch current S&P 500 via corsproxy → Yahoo Finance ── */
    async function fetchCurrent() {
      // Use explicit period1/period2 so we always get data up to today
      const period1 = Math.floor(new Date('2025-01-01').getTime() / 1000);
      const period2 = Math.floor(Date.now() / 1000);
      const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/%5EGSPC?interval=1d&period1=${period1}&period2=${period2}`;
      const proxyUrl = `https://corsproxy.io/?url=${encodeURIComponent(yahooUrl)}`;
      const resp = await fetch(proxyUrl);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const json = await resp.json();
      const closes = json.chart.result[0].indicators.quote[0].close;
      const timestamps = json.chart.result[0].timestamp;

      // filter out null values (market closures etc.)
      const pairs = timestamps.map((t, i) => [t, closes[i]]).filter(([,c]) => c != null);
      if (!pairs.length) throw new Error('No data received');

      const filtered = pairs.map(([,c]) => c);
      const lastDate = new Date(pairs[pairs.length - 1][0] * 1000).toLocaleDateString('en-US');
      return { pct: filtered.map(p => parseFloat(((p / filtered[0] - 1) * 100).toFixed(3))), lastDate };
    }

    /* ── main ── */
    async function main() {
      let historicalCycles;
      try {
        const resp = await fetch('historical_cycles.json');
        historicalCycles = await resp.json();
      } catch (e) {
        setStatus('Error loading historical_cycles.json', true);
        return;
      }

      let currentPct = null;
      try {
        setStatus('Loading current data…');
        const result = await fetchCurrent();
        currentPct = result.pct;
        const last = currentPct[currentPct.length - 1];
        setStatus(`Current cycle 2025: ${last >= 0 ? '+' : ''}${last.toFixed(1)}%  ·  Last data: ${result.lastDate}  ·  via Yahoo Finance`);
      } catch (e) {
        setStatus(`Failed to load live data: ${e.message}`, true);
      }

      buildChart(historicalCycles, currentPct);
    }

    main();
  </script>
</body>
</html>
