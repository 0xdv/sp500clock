<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S&amp;P 500 — Election Cycles</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>S&amp;P 500 Clock — All 4-Year Election Cycles Overlaid (1928–2020)</h1>
  <p class="subtitle">Older cycles are more transparent → newer are brighter &nbsp;·&nbsp; <span style="color:#FFD700">gold line</span> = current cycle 2025–present</p>
  <div class="chart-wrap">
    <canvas id="chart" height="620"></canvas>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot historical"></div>Historical cycles (1928–2020)</div>
    <div class="legend-item"><div class="legend-dot current"></div>2025–now (live)</div>
  </div>
  <div id="status">Loading data…</div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="hover.js"></script>
  <script src="build-chart.js"></script>
  <script src="chart.js"></script>
</body>
</html>
